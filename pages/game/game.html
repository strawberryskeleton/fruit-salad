<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catch | Fruit Salad</title>
    <link rel="stylesheet" href="./game.css">
    <script src="./game.js" defer></script>
</head>
<body>
    <!-- LOGO + SCORE -->
    <header>
        <div class="logo">
            <img src="../../assets/logo-inline.png" alt="logo">
        </div>

        <div class="score-div">
            HIGH SCORE:  <span id="high-score">00</span>
            SCORE:  <span id="score">00</span>
        </div>
    </header>

    <!-- MAIN GAME -->
    <main>
        <div class="fruits"></div>
        <div class="shelf">
            <a href="../../index.html"><button class="back-btn">Back To Home</button></a>
        </div>

        <div class="bowl">
            <img src="../../assets/bowl.png" alt="bowl">
        </div>
        <!-- <div class="danger-line"></div> -->
        
        <div id="start-screen" class="">
            <h1>FRUIT SALAD</h1>
            <h2>Catch Game</h2>

            <p>catch the falling fruits in the bowl to make your fruit salad</p>
            <p>(arrow keys to move the bowl)</p>

            <button class="start-btn" onclick="startGame()">Start Game</button>
        </div>

        <div id="end-screen" class="hidden">
            <h1>FRUIT SALAD</h1>
            <h2>Game Over!</h2>

            <button class="restart-btn" onclick="startGame()">Restart Game</button>
        </div>
    </main>
</body>
</html>
