<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catch | Fruit Salad</title>
    <link rel="stylesheet" href="./game.css">
    <script src="./game.js" defer></script>
</head>
<body>
    <!-- LOGO + SCORE -->
    <header>
        <div class="logo">
            <img src="../../assets/logo.png" alt="logo">
        </div>

        <div class="score-div">
            SCORE:  <span id="score">00</span>
        </div>
    </header>

    <!-- MAIN GAME -->
    <main>
        <div class="fruits"></div>
        <div class="shelf"></div>
        <div class="bowl">
            <img src="../../assets/bowl.png" alt="bowl">
        </div>
        <!-- <div class="danger-line"></div> -->
    </main>
</body>
</html>
